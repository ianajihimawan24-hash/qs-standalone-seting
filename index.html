<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Controller Dashboard</title>
    <style>
        /* TEMA WARNA & FONT BARU (INDUSTRIAL GRAY) */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap');
        
        :root { 
            --bg-main: #0f1115;       /* Background paling gelap */
            --bg-card: #16191f;       /* Background card */
            --bg-input: #0a0c0f;      /* Background kolom input */
            --text-main: #94a3b8;     /* Abu-abu terang untuk teks sekunder */
            --text-light: #f1f5f9;    /* Putih terang untuk teks utama */
            --accent-main: #64748b;   /* Slate Gray (Pengganti Oren) */
            --accent-red: #ef4444;    /* Merah modern */
            --accent-green: #10b981;  /* Hijau modern */
            --accent-yellow: #eab308; /* Kuning untuk warning */
            --border-color: #1e293b;  /* Garis batas abu-abu gelap */
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-light); 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 40px;
        }

        /* HEADER APP */
        .app-header {
            display: flex;
            align-items: center;
            padding: 10px 0 20px 0;
            border-bottom: 2px solid var(--accent-main);
            margin-bottom: 20px;
        }
        .app-icon {
            background: var(--accent-main);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            margin-right: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .app-title h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; color: var(--text-light); }
        .app-title p { margin: 2px 0 0 0; font-size: 0.75rem; color: var(--text-main); font-family: 'JetBrains Mono', monospace;}
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background-color: var(--accent-red);
            margin-left: auto;
            box-shadow: 0 0 8px var(--accent-red);
            transition: all 0.3s ease;
        }

        /* WARNING BOX */
        .warning-box {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: var(--accent-yellow);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.4;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* CARD STYLE */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent-main);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .card-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 14px;
            background: var(--accent-main);
            margin-right: 8px;
            border-radius: 2px;
        }

        /* BIG MONITOR DISPLAY */
        .monitor-display {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .monitor-grid {
            display: flex;
            justify-content: space-between;
            text-align: center;
        }
        .monitor-box { flex: 1; }
        .monitor-box:first-child { border-right: 1px solid var(--border-color); }
        .monitor-label { font-size: 0.75rem; color: var(--text-main); font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
        .monitor-value { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 2.5rem; 
            font-weight: bold; 
            color: var(--text-light); /* Default putih, berubah hijau saat nyala via JS */
            transition: color 0.3s ease;
        }
        .monitor-status {
            font-size: 0.8rem;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            text-align: left;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        /* BUTTONS */
        .btn-group { display: flex; gap: 10px; }
        .btn {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-main { background: var(--accent-main); color: white; }
        .btn-main:hover { background: #475569; }
        .btn-dark { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-dark:hover:not(:disabled) { background: #1e293b; color: #fff; }
        .btn-dark:disabled { opacity: 0.4; cursor: not-allowed; }
        .w-100 { width: 100%; margin-top: 10px; }

        /* INPUT SETTINGS */
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: border 0.3s;
        }
        .input-row:hover { border: 1px solid var(--border-color); }
        .input-row label {
            color: var(--text-main);
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            flex: 1;
        }
        .input-row input, .input-row select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 10px;
            border-radius: 6px;
            width: 120px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .input-row input:focus, .input-row select:focus { 
            outline: none; 
            border-color: var(--accent-main); 
            box-shadow: 0 0 5px rgba(100, 116, 139, 0.5);
        }

        /* LOG TERMINAL */
        .log-box {
            background: var(--bg-input);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            padding: 12px;
            height: 150px;
            overflow-y: scroll;
            border-radius: 8px;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            margin-top: 15px;
            line-height: 1.5;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }
        .log-box div { margin-bottom: 4px; }
        .log-tx { color: var(--accent-main); }
        .log-rx { color: var(--accent-green); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-icon">⚙️</div>
        <div class="app-title">
            <h1>PENGANGGURAN TEK.</h1>
            <p>ECU Controller & Monitor</p>
        </div>
        <div class="status-dot" id="headerDot"></div>
    </header>

    <div class="warning-box">
        <span>⚠️</span> jare kasdi nak butuhmu pasir aku yo butuh
    </div>

    <div class="card">
        <div class="card-title">Live Monitor</div>
        <div class="monitor-display">
            <div class="monitor-grid">
                <div class="monitor-box">
                    <div class="monitor-label">ENGINE RPM</div>
                    <div class="monitor-value" id="rpmVal">-</div>
                </div>
                <div class="monitor-box">
                    <div class="monitor-label">SENSOR ADC</div>
                    <div class="monitor-value" id="sensVal">-</div>
                </div>
            </div>
            <div class="monitor-status" id="monitorText">Menunggu koneksi...</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Koneksi Bluetooth</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-main); margin-bottom: 15px;">
            Status: <span id="bleState">Belum terhubung koyo cintamu</span>
        </div>
        <div class="btn-group">
            <button id="connectBtn" class="btn btn-main">🔍 Scan Modul</button>
            <button id="disconnectBtn" class="btn btn-dark" disabled>✕ Putuskan</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Setup Quick Shifter</div>
        <div class="input-row">
            <label>ADC Trigger</label>
            <input type="number" id="targetVal" placeholder="Misal: 1900" data-cmd="SETVAL">
        </div>
        <div class="input-row">
            <select id="shiftMode" style="width: 100%; text-align: left; padding-left: 10px;" data-cmd="M">
                <option value="0">⬇ MODE TEKAN (Compression)</option>
                <option value="1">⬆ MODE TARIK (Tension)</option>
            </select>
        </div>
        <button class="btn btn-dark w-100" onclick="sendCmd('RECAL')">↻ Kalibrasi Ulang Sensor ADC</button>
    </div>

    <div class="card">
        <div class="card-title">Cut Duration (QS)</div>
        <div class="input-row"><label>1000 - 4000</label><input type="number" id="c1" placeholder="ms" data-cmd="C1:"></div>
        <div class="input-row"><label>4000 - 6000</label><input type="number" id="c2" placeholder="ms" data-cmd="C2:"></div>
        <div class="input-row"><label>6000 - 8000</label><input type="number" id="c3" placeholder="ms" data-cmd="C3:"></div>
        <div class="input-row"><label>8k - 10k</label><input type="number" id="c4" placeholder="ms" data-cmd="C4:"></div>
        <div class="input-row"><label>10k - 12k</label><input type="number" id="c5" placeholder="ms" data-cmd="C5:"></div>
        <div class="input-row"><label>12k - 14k</label><input type="number" id="c6" placeholder="ms" data-cmd="C6:"></div>
        <div class="input-row"><label>14k+ RPM</label><input type="number" id="c7" placeholder="ms" data-cmd="C7:"></div>
    </div>

    <div class="card">
        <div class="card-title">Setup Pit Limiter</div>
        <div class="input-row"><label>Target RPM</label><input type="number" id="pl" placeholder="RPM" data-cmd="PL"></div>
        <div class="input-row"><label>Waktu Cut</label><input type="number" id="pd" placeholder="ms" data-cmd="PD"></div>
        <div class="input-row"><label>Waktu Rest</label><input type="number" id="pr" placeholder="ms" data-cmd="PR"></div>
    </div>

    <div class="card">
        <div class="card-title">Terminal Log</div>
        <div class="btn-group">
            <button class="btn btn-dark" onclick="sendCmd('INFO')">Cek Data QS</button>
            <button class="btn btn-dark" onclick="sendCmd('PI')">Cek Data PIT</button>
        </div>
        <div class="log-box" id="terminal"></div>
    </div>

    <script>
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; 
        const TX_UUID      = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; 

        let bleDevice, rxCharacteristic, txCharacteristic;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const bleState = document.getElementById('bleState');
        const headerDot = document.getElementById('headerDot');
        const monitorText = document.getElementById('monitorText');
        const terminal = document.getElementById('terminal');
        const rpmVal = document.getElementById('rpmVal');
        const sensVal = document.getElementById('sensVal');

        function logToTerminal(text, type = 'normal') {
            let cssClass = "";
            if (type === 'tx') cssClass = "log-tx";
            if (type === 'rx') cssClass = "log-rx";
            terminal.innerHTML += `<div class="${cssClass}">> ${text}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateConnectionUI(connected, msg) {
            if (connected) {
                bleState.innerText = msg;
                bleState.style.color = "var(--accent-green)";
                headerDot.style.backgroundColor = "var(--accent-green)";
                headerDot.style.boxShadow = "0 0 10px var(--accent-green)";
                monitorText.innerText = "Monitoring Aktif...";
                
                // Ubah tombol koneksi
                connectBtn.disabled = true;
                connectBtn.classList.replace('btn-main', 'btn-dark');
                disconnectBtn.disabled = false;
                disconnectBtn.classList.replace('btn-dark', 'btn-main');
            } else {
                bleState.innerText = msg;
                bleState.style.color = "var(--text-main)";
                headerDot.style.backgroundColor = "var(--accent-red)";
                headerDot.style.boxShadow = "0 0 10px var(--accent-red)";
                monitorText.innerText = "Menunggu koneksi...";
                rpmVal.innerText = "-";
                rpmVal.style.color = "var(--text-light)";
                sensVal.innerText = "-";
                
                // Kembalikan tombol
                connectBtn.disabled = false;
                connectBtn.classList.replace('btn-dark', 'btn-main');
                disconnectBtn.disabled = true;
                disconnectBtn.classList.replace('btn-main', 'btn-dark');
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                updateConnectionUI(false, "Meminta akses...");
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_QS_Mini' }],
                    optionalServices: [SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                updateConnectionUI(false, "Menghubungkan...");
                
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                rxCharacteristic = await service.getCharacteristic(RX_UUID);
                txCharacteristic = await service.getCharacteristic(TX_UUID);

                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                updateConnectionUI(true, "Terkoneksi");
                logToTerminal("Bluetooth Berhasil Terkoneksi!", "rx");
            } catch (error) {
                console.error(error);
                updateConnectionUI(false, "Koneksi dibatalkan / Gagal");
            }
        });

        disconnectBtn.addEventListener('click', () => {
            if (!bleDevice) return;
            if (bleDevice.gatt.connected) bleDevice.gatt.disconnect();
        });

        function onDisconnected() {
            updateConnectionUI(false, "Terputus");
            logToTerminal("Perangkat terputus dari sistem.", "tx");
        }

        // ========================================================
        // LOGIKA AUTO-TYPE & DELAY (TANPA ENTER)
        // ========================================================
        let debounceTimers = {};

        document.querySelectorAll('input[data-cmd], select[data-cmd]').forEach(input => {
            input.addEventListener('input', (e) => {
                const el = e.target;
                const cmdPrefix = el.getAttribute('data-cmd');
                
                clearTimeout(debounceTimers[el.id]);
                el.style.color = "var(--accent-yellow)"; // Indikator kuning saat ngedit
                
                debounceTimers[el.id] = setTimeout(() => {
                    sendSetting(cmdPrefix + el.value, el.id);
                }, 800); 
            });
        });

        async function sendSetting(command, inputId) {
            const inputElement = document.getElementById(inputId);
            if (inputElement && inputElement.value !== "") {
                inputElement.style.color = "var(--accent-yellow)"; 
                await sendCmd(command);
            }
        }

        // ========================================================
        // LOGIKA PARSING TEKS DARI ESP32
        // ========================================================
        const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };

        function handleNotifications(event) {
            let value = event.target.value;
            let decoder = new TextDecoder('utf-8');
            let text = decoder.decode(value).trim();

            if (text.includes("RPM:") && text.includes("Sens:")) {
                let rpmMatch = text.match(/RPM:\s*(\d+)/);
                let sensMatch = text.match(/Sens:\s*(\d+)/);
                
                if (rpmMatch) rpmVal.innerText = rpmMatch[1];
                if (sensMatch) sensVal.innerText = sensMatch[1];
                
                if (text.includes("[PIT ON]")) {
                    rpmVal.style.color = "var(--accent-red)";
                    monitorText.innerText = "⚠ PIT LIMITER AKTIF ⚠";
                    monitorText.style.color = "var(--accent-red)";
                } else {
                    rpmVal.style.color = "var(--accent-green)";
                    monitorText.innerText = "Monitoring Aktif...";
                    monitorText.style.color = "var(--text-main)";
                }
            } 
            else if (text.includes("=== SETTING PERMANEN TERSIMPAN ===")) {
                document.querySelectorAll('input, select').forEach(el => {
                    if (el.value !== "") el.style.color = "#fff";
                });
                logToTerminal("INFO: Data sukses tersimpan di EEPROM.", "rx");
            } 
            else if (text.includes("Threshold :")) setVal('targetVal', text.split(":")[1].trim());
            else if (text.includes("ShiftMode :")) setVal('shiftMode', text.split(":")[1].trim());
            else if (text.includes("Pit Limit :")) setVal('pl', text.split(":")[1].trim());
            else if (text.includes("Pit Cut   :")) setVal('pd', text.split(":")[1].trim());
            else if (text.includes("Pit Rest  :")) setVal('pr', text.split(":")[1].trim());
            
            else if (text.includes("C1:1k-4k")) setVal('c1', text.split(":")[2].trim());
            else if (text.includes("C2:4k-6k")) setVal('c2', text.split(":")[2].trim());
            else if (text.includes("C3:6k-8k")) setVal('c3', text.split(":")[2].trim());
            else if (text.includes("C4:8k-10k")) setVal('c4', text.split(":")[2].trim());
            else if (text.includes("C5:10k-12k")) setVal('c5', text.split(":")[2].t
